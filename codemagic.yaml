workflows:
  ios-app-store:
    name: iOS App Store
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: Codemagic
    environment:
      flutter: stable
      ios_signing:
        certificates:
          - distribution_cert
        provisioning_profiles:
          - Distribution Profile
      vars:
        BUNDLE_ID: com.fertiliza.app
    scripts:
      - name: Install dependencies
        script: flutter pub get
      - name: Generate launcher icons
        script: dart run flutter_launcher_icons
      - name: Build IPA
        script: |
          flutter build ipa --release \
            --dart-define=FLUTTER_BUILD_NAME=2.1.4 \
            --dart-define=FLUTTER_BUILD_NUMBER=16 \
            -- \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM=RJ5C82BZS5 \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PROVISIONING_PROFILE_SPECIFIER="Distribution Profile"
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true