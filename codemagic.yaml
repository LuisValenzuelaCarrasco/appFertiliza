workflows:
  ios-app-store:
    name: iOS App Store
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: Codemagic
    environment:
      flutter: stable
      ios_signing:
        certificates:
          - distribution_cert
        provisioning_profiles:
          - Distribution Profile
      vars:
        BUNDLE_ID: com.fertiliza.app
    scripts:
      - name: Set up code signing settings on Xcode project
        script: |
          gem update xcodeproj
          CERT=$(find /Users/builder/Library/MobileDevice/Certificates -name "*.p12")
          security import "$CERT" -k ~/Library/Keychains/login.keychain-db -P "" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple: -s -k "" ~/Library/Keychains/login.keychain-db
          security list-keychains -s ~/Library/Keychains/login.keychain-db
          security default-keychain -s ~/Library/Keychains/login.keychain-db
          xcode-project use-profiles --verbose
      - name: Install dependencies
        script: flutter pub get
      - name: Generate launcher icons
        script: dart run flutter_launcher_icons
      - name: Diagnose bridging header
        script: |
          cd /Users/builder/clone/ios
          pod install 2>&1
          echo "=== Pods con bridging headers ==="
          find /Users/builder/clone/ios/Pods -name "*-Bridging-Header*" 2>/dev/null
          echo "=== project.pbxproj bridging headers ==="
          grep -n "SWIFT_OBJC_BRIDGING_HEADER" /Users/builder/clone/ios/Pods/Pods.xcodeproj/project.pbxproj 2>/dev/null || echo "No encontrado en Pods"
          grep -rn "SWIFT_OBJC_BRIDGING_HEADER" /Users/builder/clone/ios/ 2>/dev/null
      - name: Build IPA
        script: |
          set -o pipefail
          xcodebuild archive \
            -workspace /Users/builder/clone/ios/Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -archivePath /Users/builder/clone/build/Runner.xcarchive \
            -allowProvisioningUpdates \
            2>&1 | grep -E "error:|warning:|bridging|SWIFT_OBJC" | head -50
          flutter build ipa --release \
            --export-options-plist=/Users/builder/export_options.plist
          find /Users/builder -name "*.ipa" 2>/dev/null
    artifacts:
      - build/ios/ipa/*.ipa
      - /Users/builder/clone/build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true