workflows:
  android-play-store:
    name: Android Play Store
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      android_signing:
        - keystore_reference
    scripts:
      - name: Generate launcher icons
        script: |
          flutter pub get
          dart run flutter_launcher_icons
      - name: Flutter build
        script: |
          flutter build appbundle --release
    artifacts:
      - build/app/outputs/bundle/release/app-release.aab
    publishing:
      google_play:
        credentials: $GCLOUD_SERVICE_ACCOUNT_CREDENTIALS
        track: internal

ios-app-store:
    name: iOS App Store
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: Codemagic
    environment:
      flutter: stable
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.fertiliza.app
    scripts:
      - name: Set up code signing
        script: |
          keychain initialize
          keychain add-certificates
          xcode-project use-profiles
      - name: Fix iOS deployment target
        script: |
          sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = 13.0/IPHONEOS_DEPLOYMENT_TARGET = 15.0/g' ios/Runner.xcodeproj/project.pbxproj
      - name: Fix bridging headers
        script: |
          sed -i '' 's/SWIFT_OBJC_BRIDGING_HEADER/SWIFT_OBJC_BRIDGING_HEADER_DISABLED/g' ios/Runner.xcodeproj/project.pbxproj || true
          find . -name "*.pbxproj" -exec sed -i '' '/SWIFT_OBJC_BRIDGING_HEADER/d' {} \; || true
      - name: Generate launcher icons
        script: |
          flutter pub get
          dart run flutter_launcher_icons
      - name: Flutter build
        script: |
          flutter build ipa --release \
            --export-options-plist=$CM_BUILD_DIR/ios/ExportOptions.plist
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true

  ios-adhoc:
    name: iOS Ad Hoc
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: Codemagic
    environment:
      flutter: stable
      ios_signing:
        distribution_type: ad_hoc
        bundle_identifier: com.fertiliza.app
    scripts:
      - name: Set up code signing
        script: |
          keychain initialize
          keychain add-certificates
          xcode-project use-profiles
      - name: Fix iOS deployment target
        script: |
          sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = 13.0/IPHONEOS_DEPLOYMENT_TARGET = 15.0/g' ios/Runner.xcodeproj/project.pbxproj
      - name: Flutter build
        script: |
          flutter pub get
          flutter build ipa --release \
            --export-options-plist=$CM_BUILD_DIR/ios/ExportOptions.plist
    artifacts:
      - build/ios/ipa/*.ipa