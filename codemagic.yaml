workflows:
  ios-app-store:
    name: iOS App Store
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: Codemagic

    environment:
      flutter: stable
      vars:
        BUNDLE_ID: com.fertiliza.app

    scripts:
      - name: Install dependencies
        script: flutter pub get

      - name: Build IPA
        script: flutter build ipa --release

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true