workflows:
  ios-app-store:
    name: iOS App Store
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: Codemagic
    environment:
      flutter: stable
      xcode: 26
      ios_signing:
        certificates:
          - distribution_cert
        provisioning_profiles:
          - Distribution Profile
      vars:
        BUNDLE_ID: com.fertiliza.app
    scripts:
      - name: Disable Swift Package Manager
        script: |
          flutter config --no-enable-swift-package-manager
      - name: Set up code signing settings on Xcode project
        script: |
          xcode-project use-profiles --verbose
      - name: Install dependencies
        script: flutter pub get
      - name: Generate launcher icons
        script: dart run flutter_launcher_icons
      - name: Install pods
        script: |
          cd $CM_BUILD_DIR/ios
          rm -rf Pods Podfile.lock .symlinks
          pod install --repo-update
      - name: Create ExportOptions.plist
        script: |
          rm -f /Users/builder/export_options.plist
          /usr/libexec/PlistBuddy -c "Add :method string app-store" /Users/builder/export_options.plist
          /usr/libexec/PlistBuddy -c "Add :teamID string RJ5C82BZS5" /Users/builder/export_options.plist
          /usr/libexec/PlistBuddy -c "Add :signingStyle string manual" /Users/builder/export_options.plist
          /usr/libexec/PlistBuddy -c "Add :signingCertificate string 'Apple Distribution'" /Users/builder/export_options.plist
          /usr/libexec/PlistBuddy -c "Add :provisioningProfiles dict" /Users/builder/export_options.plist
          /usr/libexec/PlistBuddy -c "Add :provisioningProfiles:com.fertiliza.app string 'distribution_cert'" /Users/builder/export_options.plist
          cat /Users/builder/export_options.plist
      - name: Build IPA
        script: |
          flutter build ipa --release \
            --export-options-plist=/Users/builder/export_options.plist
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: false