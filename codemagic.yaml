workflows:
  ios-app-store:
    name: iOS App Store
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: Codemagic
    environment:
      flutter: stable
      ios_signing:
        certificates:
          - distribution_cert
        provisioning_profiles:
          - Distribution Profile
      vars:
        BUNDLE_ID: com.fertiliza.app
    scripts:
      - name: Set up code signing settings on Xcode project
        script: |
          gem update xcodeproj
          CERT=$(find /Users/builder/Library/MobileDevice/Certificates -name "*.p12")
          security import "$CERT" -k ~/Library/Keychains/login.keychain-db -P "" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple: -s -k "" ~/Library/Keychains/login.keychain-db
          security list-keychains -s ~/Library/Keychains/login.keychain-db
          security default-keychain -s ~/Library/Keychains/login.keychain-db
          xcode-project use-profiles --verbose
      - name: Install dependencies
        script: flutter pub get
      - name: Generate launcher icons
        script: dart run flutter_launcher_icons
      - name: Clean and reinstall pods
        script: |
          cd /Users/builder/clone/ios
          rm -rf Pods Podfile.lock
          pod install --repo-update
      - name: Fix bridging header in pbxproj
        script: |
          sed -i '' 's/SWIFT_OBJC_BRIDGING_HEADER = "Runner\/Runner-Bridging-Header.h";/SWIFT_OBJC_BRIDGING_HEADER = "";/g' /Users/builder/clone/ios/Runner.xcodeproj/project.pbxproj
          echo "Verificando:"
          grep "SWIFT_OBJC_BRIDGING_HEADER" /Users/builder/clone/ios/Runner.xcodeproj/project.pbxproj
      - name: Build IPA
        script: |
          flutter build ipa --release \
            --export-options-plist=/Users/builder/export_options.plist
          find /Users/builder -name "*.ipa" 2>/dev/null
    artifacts:
      - build/ios/ipa/*.ipa
      - /Users/builder/clone/build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true